name: CI/CD Pipeline

on:
  # Trigger the workflow on push to the main branch
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  # Image names for GitHub Container Registry
  BACK_IMAGE: ghcr.io/${{ github.repository }}-back
  FRONT_IMAGE: ghcr.io/${{ github.repository }}-front
  DB_IMAGE: ghcr.io/${{ github.repository }}-db

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1: Checkout the source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx for advanced caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Authenticate with GHCR
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: Generate short SHA for image tagging
      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Step 5: Build and push Backend image (Symfony/FrankenPHP)
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/prod/back/Dockerfile
          push: true
          tags: |
            ${{ env.BACK_IMAGE }}:latest
            ${{ env.BACK_IMAGE }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha,scope=back
          cache-to: type=gha,mode=max,scope=back

      # Step 6: Build and push Frontend image (Next.js)
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/prod/front/Dockerfile
          push: true
          tags: |
            ${{ env.FRONT_IMAGE }}:latest
            ${{ env.FRONT_IMAGE }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha,scope=front
          cache-to: type=gha,mode=max,scope=front
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ vars.DOMAIN }}

      # Step 7: Build and push Database image (MariaDB)
      - name: Build and push Database image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/prod/db/Dockerfile
          push: true
          tags: |
            ${{ env.DB_IMAGE }}:latest
            ${{ env.DB_IMAGE }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha,scope=db
          cache-to: type=gha,mode=max,scope=db

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # Step 8: Checkout only the necessary compose files
      - name: Checkout compose file only
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            compose.yaml
            compose.deploy.yaml
          sparse-checkout-cone-mode: false

      # Step 9: Transfer compose files to the production server
      - name: Copy compose file to production
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DOMAIN }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          source: "compose.yaml,compose.deploy.yaml"
          target: ${{ vars.APP_DIR }}

      # Step 10: Pull new images and restart services on production
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DOMAIN }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd ${{ vars.APP_DIR }}
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f compose.yaml -f compose.deploy.yaml pull
            docker compose -f compose.yaml -f compose.deploy.yaml up -d --remove-orphans
            docker image prune -f
